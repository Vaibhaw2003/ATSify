# ATSify Backend Application Properties
# ====================================

# Server
server.port=8080

# MongoDB Configuration
spring.data.mongodb.uri=mongodb://localhost:27017/atsify
spring.data.mongodb.database=atsify

# JWT Configuration
app.jwt.secret=ATSifySecretKeyForJWTTokenGeneration2024MustBeAtLeast256BitsLong!
app.jwt.expiration=86400000

# File Upload Configuration
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# OpenAI Configuration (optional — leave empty to use built-in suggestions)
app.openai.api-key=${OPENAI_API_KEY:}
app.openai.model=gpt-3.5-turbo

# Upload directory
app.upload.dir=./uploads

# CORS
app.cors.allowed-origins=http://localhost:3000
